<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Toilet Map Cluj-Napoca</title>
    <meta
      name="description"
      content="Mobile-friendly OpenStreetMap-based map of public toilets in Cluj-Napoca, including custom locations."
    >
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    >
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Public Toilets</p>
          <h1>Toilet Map Cluj-Napoca</h1>
        </div>
      </header>

      <main class="page">
        <section class="hero-card">
          <p class="hero-text">
            Browse public toilets from OpenStreetMap across Cluj-Napoca with a simple mobile-friendly map.
          </p>
          <div class="legend" aria-label="Marker legend">
            <span class="legend-item">
              <span class="legend-dot legend-dot-osm"></span>
              Toilet location
            </span>
          </div>
        </section>

        <section class="map-card">
          <div class="status-row">
            <p id="status-message" class="status-message" role="status" aria-live="polite">
              Loading map data...
            </p>
          </div>

          <div class="map-helper" aria-label="Map instructions">
            <p class="map-helper-title">Map guide</p>
            <p id="selection-coordinates" class="map-helper-copy">
              Tap a toilet icon to quickly see whether it is free or requires a fee.
            </p>
          </div>

          <div class="map-frame">
            <div id="map" aria-label="Map of public toilets in Cluj-Napoca"></div>
            <div class="map-controls" aria-label="Map zoom controls">
              <button id="zoom-in-button" class="map-control-button" type="button" aria-label="Zoom in">
                +
              </button>
              <button id="zoom-out-button" class="map-control-button" type="button" aria-label="Zoom out">
                -
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
