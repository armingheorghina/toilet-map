<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Toilet Map Cluj-Napoca</title>
    <meta
      name="description"
      content="Mobile-friendly MapTiler streets map of public toilets in Cluj-Napoca, including custom locations."
    >
    <link rel="icon" href="./src/toilet.png" type="image/png" sizes="32x32">
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Public Toilets</p>
          <h1>Toilet Map Cluj-Napoca</h1>
          <p class="subhead">Când te scapa, te scapă!</p>
        </div>
      </header>

      <main class="page">
        <section class="hero-card">
          <div class="legend" aria-label="Marker legend">
            <span class="legend-item">
              <span class="legend-dot legend-dot-custom"></span>
              Your saved toilets
            </span>
          </div>

          <details class="add-toilet-panel">
            <summary class="add-toilet-summary">Add a toilet</summary>
            <form id="add-toilet-form" class="add-toilet-form">
              <p class="add-toilet-hint">
                Add a place you want to remember. It stays on this device only.
              </p>
              <label class="field">
                <span class="field-label">Name</span>
                <input name="name" type="text" required autocomplete="off" placeholder="e.g. Mall restroom">
              </label>
              <label class="field">
                <span class="field-label">Notes (optional)</span>
                <textarea name="notes" rows="2" placeholder="Floor, code, hours…"></textarea>
              </label>
              <div class="coords-row">
                <label class="field field--narrow">
                  <span class="field-label">Latitude</span>
                  <input name="lat" type="text" inputmode="decimal" required placeholder="46.77">
                </label>
                <label class="field field--narrow">
                  <span class="field-label">Longitude</span>
                  <input name="lng" type="text" inputmode="decimal" required placeholder="23.59">
                </label>
              </div>
              <div class="add-toilet-actions">
                <button type="button" id="pick-location-button" class="ghost-button">Pick on map</button>
                <button type="button" id="use-map-center-button" class="ghost-button">Use map center</button>
                <button type="submit" class="primary-button">Save toilet</button>
              </div>
            </form>
          </details>
        </section>

        <section class="map-card">
          <div class="map-frame">
            <div id="map" aria-label="Map of public toilets in Cluj-Napoca"></div>
            <div class="map-controls" aria-label="Map zoom controls">
              <button id="zoom-in-button" class="map-control-button" type="button" aria-label="Zoom in">
                +
              </button>
              <button id="zoom-out-button" class="map-control-button" type="button" aria-label="Zoom out">
                -
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="support-footer" class="support-footer" hidden>
      <a
        id="support-footer-link"
        class="support-footer-link"
        href="#"
        rel="noopener noreferrer"
        target="_blank"
        aria-label="Support on Ko-fi"
      >
        <span class="kofi-badge" aria-hidden="true">
          <svg viewBox="0 0 300 110" class="kofi-badge-svg" role="img">
            <rect x="0" y="0" width="300" height="110" rx="20" fill="#29ABE0"></rect>
            <rect x="18" y="20" width="66" height="66" rx="12" fill="#FFFFFF"></rect>
            <path d="M34 44h34c6.2 0 11.2 5 11.2 11.2S74.2 66.4 68 66.4h-2.9l-6.1 9.6a9.6 9.6 0 0 1-16.2 0L32.7 60.2A10.5 10.5 0 0 1 41.5 44Z" fill="#FF5E5B"></path>
            <text x="98" y="53" fill="#FFFFFF" font-size="26" font-family="Arial, sans-serif" font-weight="700">Support me</text>
            <text x="98" y="82" fill="#FFFFFF" font-size="22" font-family="Arial, sans-serif">on Ko-fi</text>
          </svg>
        </span>
      </a>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
