name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
      - codex/cluj-toilets-mvp
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write MapTiler config from secret
        env:
          MAPTILER_API_KEY: ${{ secrets.MAPTILER_API_KEY }}
        run: |
          if [ -z "${MAPTILER_API_KEY}" ]; then
            echo "::error::Repository secret MAPTILER_API_KEY is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          node <<'NODE'
          const fs = require("fs");
          let key = process.env.MAPTILER_API_KEY || "";
          key = key.replace(/\r\n/g, "\n").trim();
          if ((key.startsWith('"') && key.endsWith('"')) || (key.startsWith("'") && key.endsWith("'"))) {
            key = key.slice(1, -1).trim();
          }
          if (!key) {
            console.error("MAPTILER_API_KEY is empty after trim");
            process.exit(1);
          }
          const body =
            "/**\n * Generated in CI from MAPTILER_API_KEY — do not commit.\n */\n" +
            `export const MAPTILER_API_KEY = ${JSON.stringify(key)};\n`;
          fs.writeFileSync("src/maptiler-config.js", body, "utf8");
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
