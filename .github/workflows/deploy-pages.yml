name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
      - codex/cluj-toilets-mvp
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Mapcherry config from secret
        env:
          MAPCHERRY_API_TOKEN: ${{ secrets.MAPCHERRY_API_TOKEN }}
        run: |
          if [ -z "${MAPCHERRY_API_TOKEN}" ]; then
            echo "::error::Repository secret MAPCHERRY_API_TOKEN is not set. Add it under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          node <<'NODE'
          const fs = require("fs");
          let token = process.env.MAPCHERRY_API_TOKEN || "";
          token = token.replace(/\r\n/g, "\n").trim();
          if ((token.startsWith('"') && token.endsWith('"')) || (token.startsWith("'") && token.endsWith("'"))) {
            token = token.slice(1, -1).trim();
          }
          if (!token) {
            console.error("MAPCHERRY_API_TOKEN is empty after trim");
            process.exit(1);
          }
          const body =
            "/**\n * Generated in CI from MAPCHERRY_API_TOKEN - do not commit.\n */\n" +
            `export const MAPCHERRY_API_TOKEN = ${JSON.stringify(token)};\n`;
          fs.writeFileSync("src/maptiler-config.js", body, "utf8");
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
